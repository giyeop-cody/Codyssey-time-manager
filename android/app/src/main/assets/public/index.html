<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코디세이 출입 현황 알리미</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #121212; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .loading { text-align: center; }
  .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4ec9b0; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <div>로딩 중...</div>
</div>
<!-- Capacitor 앱 시작 시 popup.html로 리다이렉트.
     27차: 인라인 스크립트 → 외부 파일로 분리 (MV3 CSP script-src 'self'는 인라인 스크립트 차단).
     replace로 대체해 히스토리에 남기지 않음 — 뒤로가기 시 index↔popup 무한 루프 방지 -->
<script src="js/index-redirect.js"></script>
</body>
</html>
