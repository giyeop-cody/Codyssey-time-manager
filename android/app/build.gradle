apply plugin: 'com.android.application'

// 릴리스 서명 키스토어 (CI 태그 빌드 시 secrets로부터 복호화됨)
def releaseKeystore = file('keystore.jks')

android {
    namespace 'kr.codyssey.attendance'
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "kr.codyssey.attendance"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    buildFeatures {
        buildConfig true
    }
    signingConfigs {
        // N1 개선: 저장소에 커밋된 고정 디버그 키스토어 사용 (공개 표준 자격증명).
        // CI 러너의 ~/.android/debug.keystore 는 매 실행마다 재생성되어
        // 서명이 달라지고, 기기에서 APK 덮어쓰기(업데이트) 설치가 불가능했음.
        // androiddebugkey/android 는 Android SDK 기본 디버그 자격증명으로 공개 값이며,
        // 프로덕션 키가 아니므로 저장소 포함이 공식 권장 패턴임.
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (releaseKeystore.exists()) {
                storeFile releaseKeystore
                storePassword System.getenv('STORE_PASSWORD') ?: ''
                keyAlias System.getenv('KEY_ALIAS') ?: ''
                keyPassword System.getenv('KEY_PASSWORD') ?: ''
            }
        }
    }
    buildTypes {
        release {
            if (releaseKeystore.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
            signingConfig signingConfigs.debug
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.work:work-runtime:$androidxWorkVersion"

    // Capacitor core
    implementation project(':capacitor-android')
}

// DO NOT EDIT: managed by "capacitor sync" (Capacitor 플러그인 모듈 의존성 추가)
apply from: 'capacitor.build.gradle'
