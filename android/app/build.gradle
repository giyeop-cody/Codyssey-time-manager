apply plugin: 'com.android.application'

// 릴리스 서명 키스토어 (CI 태그 빌드 시 secrets로부터 복호화됨)
def releaseKeystore = file('keystore.jks')

android {
    namespace 'kr.codyssey.attendance'
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "kr.codyssey.attendance"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // L12: CI에서는 GITHUB_RUN_NUMBER로 versionCode 자동 증가 (로컬은 1)
        // VERSION_NAME은 태그명에서 전달 (v1.2.0 → 1.2.0으로 v 접두어 제거)
        // ※ `(expr).method()`를 공백 명령형으로 쓰면 .method()가 전체 호출 결과에 붙어
        //   CI에서 "Value is null" 평가 오류가 나므로, Integer.parseInt/괄호로 명확히 작성
        versionCode Integer.parseInt(System.getenv('GITHUB_RUN_NUMBER') ?: '1')
        versionName((System.getenv('VERSION_NAME') ?: '1.0.0').replaceFirst(/^v/, ''))
    }
    buildFeatures {
        buildConfig true
    }
    signingConfigs {
        // 48차 (V-1): 커밋된 고정 디버그 키스토어 폐기 — 공개 키로 배포물이 서명되던 문제 해소.
        // 디버그 키는 로컬 파일이 있을 때만 사용(없으면 Gradle 기본 생성 키).
        // 배포는 release 키스토어(CI가 secrets에서 복호화)로만 서명한다.
        def dbgKeystore = file('debug.keystore')
        debug {
            if (dbgKeystore.exists()) {
                storeFile dbgKeystore
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
        release {
            if (releaseKeystore.exists()) {
                storeFile releaseKeystore
                storePassword System.getenv('STORE_PASSWORD') ?: ''
                keyAlias System.getenv('KEY_ALIAS') ?: ''
                keyPassword System.getenv('KEY_PASSWORD') ?: ''
            }
        }
    }
    buildTypes {
        release {
            if (releaseKeystore.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
            signingConfig signingConfigs.debug
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.work:work-runtime:$androidxWorkVersion"

    // Capacitor core
    implementation project(':capacitor-android')

    // 31차: 물리 탐지(C안) — 지오펜스 + 활동 인식 클라이언트 (Play services)
    implementation 'com.google.android.gms:play-services-location:21.3.0'
}

// DO NOT EDIT: managed by "capacitor sync" (Capacitor 플러그인 모듈 의존성 추가)
apply from: 'capacitor.build.gradle'
