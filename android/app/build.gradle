apply plugin: 'com.android.application'

// 릴리스 서명 키스토어 (CI 태그 빌드 시 secrets로부터 복호화됨)
def releaseKeystore = file('keystore.jks')

android {
    namespace 'kr.codyssey.attendance'
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "kr.codyssey.attendance"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    buildFeatures {
        buildConfig true
    }
    signingConfigs {
        release {
            if (releaseKeystore.exists()) {
                storeFile releaseKeystore
                storePassword System.getenv('STORE_PASSWORD') ?: ''
                keyAlias System.getenv('KEY_ALIAS') ?: ''
                keyPassword System.getenv('KEY_PASSWORD') ?: ''
            }
        }
    }
    buildTypes {
        release {
            if (releaseKeystore.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.work:work-runtime:$androidxWorkVersion"

    // Capacitor core
    implementation project(':capacitor-android')
}

// DO NOT EDIT: managed by "capacitor sync" (Capacitor 플러그인 모듈 의존성 추가)
apply from: 'capacitor.build.gradle'
