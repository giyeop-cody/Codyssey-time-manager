name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and setup Gradle
        run: |
          curl -L -o gradle.zip "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
          unzip -q gradle.zip
          export PATH=$PWD/gradle-8.5/bin:$PATH
          gradle --version

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          export PATH=$PWD/gradle-8.5/bin:$PATH
          gradle assembleDebug --no-daemon -p app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codyssey-access-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7